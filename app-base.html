<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Plantilla base HTML, CSS y JavaScript" />
  <title>Base HTML CSS JS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Proyecto base</h1>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Cambiar tema">🌙</button>
    </div>
  </header>

  <main class="container main-content">
    <section class="hero">
      <p class="eyebrow">Starter template</p>
      <h2>Tu estructura inicial está lista</h2>
      <p>
        Usa esta base para empezar cualquier proyecto web con una separación clara entre HTML, CSS y JavaScript.
      </p>
      <button class="primary-btn" id="actionBtn" type="button">Probar JavaScript</button>
      <p id="message" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
